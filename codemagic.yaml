# FlechaCam / OpenCamera-OMT — build de teste (debug APK, sem keystore)
# Coloque este arquivo na RAIZ do repositório (fork do opencamera-omt)

workflows:
  android-debug:
    name: OMT Camera - Debug APK
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
